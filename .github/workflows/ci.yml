name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

jobs:
  bats:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install sqlite3
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get install -y sqlite3
          else
            brew install sqlite3 || true
          fi
      - name: Install cast-observe
        run: CI=true bash install.sh
      - name: Verify version
        run: cast-observe --version
      - name: Run BATS suite
        run: tests/bats/bin/bats tests/install.bats tests/cli.bats tests/hooks.bats tests/db.bats --tap
